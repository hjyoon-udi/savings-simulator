<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>저축 시뮬레이터</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <h1>저축 시뮬레이터</h1>
        <p>매월 일정 금액을 저축하고 연 이자율이 적용될 때, 미래 예상 금액을 확인해 보세요.</p>
      </header>

      <main class="app-main">
        <section class="card input-section">
          <h2 class="section-title">입력</h2>

          <div class="input-group">
            <label for="monthly-amount">월 저축액 (원)</label>
            <input
              type="number"
              id="monthly-amount"
              min="0"
              step="10000"
              placeholder="예: 500000"
            />
          </div>

          <div class="input-group">
            <label for="annual-rate">연 이자율 (%)</label>
            <input
              type="number"
              id="annual-rate"
              min="0"
              max="100"
              step="0.1"
              placeholder="예: 3.5"
            />
          </div>
        </section>

        <section class="card result-section">
          <h2 class="section-title">예상 결과</h2>

          <div class="result-list">
            <div class="result-item">
              <span class="result-period">3년 후</span>
              <span class="result-amount" id="result-3y">-</span>
            </div>
            <div class="result-item">
              <span class="result-period">5년 후</span>
              <span class="result-amount" id="result-5y">-</span>
            </div>
            <div class="result-item">
              <span class="result-period">10년 후</span>
              <span class="result-amount" id="result-10y">-</span>
            </div>
          </div>

          <div class="result-breakdown">
            <h3>상세 내역</h3>
            <ul id="breakdown-list"></ul>
          </div>
        </section>
      </main>

      <footer class="app-footer">
        <small>※ 복리 기준 (월 단위 적용)이며, 실제 수익률과 다를 수 있습니다.</small>
      </footer>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
